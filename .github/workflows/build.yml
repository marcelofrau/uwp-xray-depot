name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-2022
    defaults:
      run:
        shell: pwsh

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Build Lua 5.4
        run: scripts/build-lua.ps1

      - name: Build xray-sock
        run: scripts/build-xray-sock.ps1

      - name: Verify xray-sock.lib
        run: |
          if (-not (Test-Path x64/lib/xray-sock.lib)) {
            throw "xray-sock.lib not found"
          }
          Write-Output "xray-sock.lib: $((Get-Item x64/lib/xray-sock.lib).Length) bytes"

      - name: Verify lua5.4.lib
        run: |
          if (-not (Test-Path x64/lib/lua5.4.lib)) {
            throw "lua5.4.lib not found"
          }
          Write-Output "lua5.4.lib: $((Get-Item x64/lib/lua5.4.lib).Length) bytes"

      - name: Verify depot CMake imports
        run: |
          cmake -B build-verify
          cmake --build build-verify --config Release
          Remove-Item build-verify -Recurse -Force

      - name: Verify no XB_INSPECTOR_ENABLED leaks without define
        run: |
          # Compile a small TU that includes inspector.hpp WITHOUT the define
          # and verify no symbols leak
          @"
          #include <xray/inspector.hpp>
          int main() { return 0; }
          "@ | Out-File -Encoding utf8 check_leak.cpp
          cl /c /Ix64/include /Iexternal/spdlog/include /Iexternal/json/single_include check_leak.cpp
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Compilation without XB_INSPECTOR_ENABLED failed"
            exit 1
          }
          Write-Output "No-leak verification OK"
